# ============================================================
# JavBus 爬虫 - 飞牛OS 镜像拉取部署（推荐，无需 Dockerfile）
# ============================================================
#
# 【飞牛OS 步骤】
# 1. 创建目录，例如 /vol1/1000/docker/javbus-scraper
# 2. 只上传本文件（重命名为 docker-compose.yml）并创建 data、downloads 子目录
# 3. Docker → 新增项目 → 选择该目录 → 立即部署
# 4. 访问 http://飞牛IP:18000
#
# 镜像地址：ghcr.io/ljl910725/javbus-scraper:latest
# ============================================================

services:
  javbus-scraper:
    image: ghcr.io/ljl910725/javbus-scraper:latest
    pull_policy: always
    container_name: javbus-scraper
    restart: unless-stopped
    ports:
      - "18000:8000"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      # 若要把字幕直接存到影片目录，可再加挂载，例如：
      # - /vol1/1000/你的影片目录:/app/downloads/subtitles
    environment:
      TZ: Asia/Shanghai
      JWT_SECRET: change-me-to-a-random-secret
      BASE_URL: https://www.javbus.com
      PUSH_BACKEND: cd2
      SUBTITLE_BROWSE_ROOTS: downloads,downloads/subtitles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
