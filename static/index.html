<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavBus 番号爬虫</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header class="top-header">
      <div>
        <h1>JavBus 番号爬虫</h1>
        <p class="subtitle">精确查询番号，或模糊搜索影片</p>
      </div>
      <div class="header-actions">
        <div id="userMenu" class="user-menu hidden">
          <button type="button" class="user-menu-trigger" id="userMenuTrigger" aria-haspopup="true">
            <span id="userMenuName"></span>
            <span class="user-menu-caret" aria-hidden="true">▾</span>
          </button>
          <div class="user-menu-dropdown" id="userMenuDropdown" role="menu">
            <a href="/" role="menuitem">首页</a>
            <a href="/settings" role="menuitem">配置</a>
            <a href="/history" role="menuitem">推送历史</a>
            <button type="button" id="userMenuLogoutBtn" role="menuitem">退出</button>
          </div>
        </div>
        <button id="loginBtn" class="ghost-btn" type="button">登录</button>
        <button id="registerBtn" class="ghost-btn" type="button">注册</button>
      </div>
    </header>

    <section class="search-panel">
      <div class="search-mode-tabs">
        <button id="exactModeBtn" class="mode-tab active" type="button" data-mode="exact">精确查询</button>
        <button id="fuzzyModeBtn" class="mode-tab" type="button" data-mode="fuzzy">模糊搜索</button>
      </div>

      <div id="exactSearchFields">
        <label for="codes">番号（每行一个，支持批量）</label>
        <textarea id="codes" rows="5" placeholder="SSNI-730&#10;IPX-177"></textarea>
      </div>

      <div id="fuzzySearchFields" class="hidden">
        <label for="fuzzyQuery">关键词（空格分隔，仅支持单次搜索）</label>
        <input id="fuzzyQuery" type="text" placeholder="例如：三上 悠亚 教师" />
        <p class="field-hint">模糊搜索与精确查询共用列表视图；默认点击条目查看详情，开启多选后可批量复制/推送</p>
      </div>

      <div class="options">
        <label class="checkbox" id="downloadCoverOption">
          <input type="checkbox" id="downloadCover" />
          下载封面到本地
        </label>
        <button id="searchBtn" type="button">开始查询</button>
      </div>

      <div id="status" class="status hidden"></div>
    </section>

    <section id="configInfo" class="config-info hidden"></section>
    <section id="errors" class="errors hidden"></section>
    <section id="results" class="results"></section>
  </div>

  <div id="authModal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" type="button" data-close-modal>&times;</button>
      <h2 id="authModalTitle">登录</h2>
      <form id="authForm">
        <label id="emailField" class="hidden">
          邮箱
          <input type="email" id="authEmail" />
        </label>
        <label>
          用户名
          <input type="text" id="authUsername" required />
        </label>
        <label>
          密码
          <input type="password" id="authPassword" required />
        </label>
        <button type="submit" id="authSubmitBtn">确认</button>
      </form>
      <p id="authError" class="auth-error hidden"></p>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden" aria-hidden="true">
    <button class="lightbox-close" type="button" data-close-lightbox aria-label="关闭">&times;</button>
    <button id="lightboxPrev" class="lightbox-nav lightbox-prev" type="button" aria-label="上一张">&lsaquo;</button>
    <button id="lightboxNext" class="lightbox-nav lightbox-next" type="button" aria-label="下一张">&rsaquo;</button>
    <div class="lightbox-content">
      <div class="lightbox-stage">
        <img id="lightboxImage" alt="预览图" />
      </div>
      <div id="lightboxCounter" class="lightbox-counter"></div>
      <div id="lightboxThumbs" class="lightbox-thumbs"></div>
    </div>
  </div>

  <div id="pushFolderModal" class="modal hidden">
    <div class="modal-card push-folder-modal-card">
      <div class="modal-header">
        <h2>选择推送目录</h2>
        <button id="closePushFolderModalBtn" class="ghost-btn" type="button">关闭</button>
      </div>
      <p class="field-hint">请选择要将磁力推送到哪个目录</p>
      <div id="pushFolderChoices" class="push-folder-choices"></div>
    </div>
  </div>

  <div id="subtitleModal" class="modal hidden">
    <div class="modal-card subtitle-modal-card">
      <div class="modal-header">
        <h2 id="subtitleModalTitle">外挂字幕</h2>
        <button id="closeSubtitleModalBtn" class="ghost-btn" type="button">关闭</button>
      </div>
      <div id="subtitleModalList" class="subtitle-list"></div>
    </div>
  </div>

  <div id="subtitleSaveModal" class="modal hidden">
    <div class="modal-card folder-modal-card subtitle-save-modal-card">
      <div class="modal-header">
        <h2>保存字幕到目录</h2>
        <button id="closeSubtitleSaveModalBtn" class="ghost-btn" type="button">关闭</button>
      </div>
      <label class="subtitle-save-filename">
        文件名
        <input id="subtitleSaveFilename" type="text" placeholder="SSIS-001.zh.srt" />
      </label>
      <label class="subtitle-save-target">
        保存目录
        <input id="subtitleSaveTargetDir" type="text" readonly placeholder="请从下方选择目录" />
      </label>
      <div class="folder-modal-toolbar">
        <button id="subtitleSaveUpBtn" class="ghost-btn" type="button">上级目录</button>
        <span id="subtitleSaveCurrentPath" class="folder-current-path">/</span>
        <button id="subtitleSaveUseDirBtn" class="ghost-btn" type="button">使用当前目录</button>
      </div>
      <div class="subtitle-save-search">
        <input id="subtitleSaveSearchInput" type="text" placeholder="递归搜索文件名，如 SSIS-001 或 .mp4" />
        <button id="subtitleSaveSearchBtn" class="ghost-btn" type="button">搜索</button>
      </div>
      <div id="subtitleSaveSearchResults" class="folder-list subtitle-save-search-results hidden"></div>
      <p class="field-hint">文件夹按修改时间新→旧排序；可递归搜索并定位到文件所在目录</p>
      <div id="subtitleSaveFolderList" class="folder-list"></div>
      <div class="subtitle-save-actions">
        <button id="subtitleSaveConfirmBtn" type="button">保存到目录</button>
      </div>
      <p id="subtitleSaveModalStatus" class="inline-status"></p>
    </div>
  </div>

  <script src="/static/auth.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
